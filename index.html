<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MathRoot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="wrap">

  <!-- ── HEADER ── -->
  <header>
    <button class="logo" onclick="goHome()" title="MathRoot">
      <div class="logo-icon">🧮</div>
      <span class="logo-text">MathRoot</span>
    </button>
    <div class="header-controls">

      <!-- Theme toggle -->
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme">
        <span class="theme-icon" id="theme-icon">☀️</span>
      </button>

      <!-- Language picker -->
      <div class="lang-picker" id="lang-picker">
        <button class="lang-btn" id="lang-btn" onclick="toggleLangMenu()" aria-haspopup="listbox" aria-expanded="false">
          <span id="lang-btn-label">EN</span>
          <span class="grade-chevron">▾</span>
        </button>
        <div class="lang-menu" id="lang-menu" role="listbox">
          <div class="lang-option active" data-lang="en" onclick="selectLang('en')">
            <span class="lang-flag">🇬🇧</span><span class="lang-name">English</span>
          </div>
          <div class="lang-option" data-lang="da" onclick="selectLang('da')">
            <span class="lang-flag">🇩🇰</span><span class="lang-name">Dansk</span>
          </div>
        </div>
      </div>

      <!-- Grade picker -->
      <div class="grade-picker" id="grade-picker">
        <button class="grade-btn" id="grade-btn" onclick="toggleGradeMenu()" aria-haspopup="listbox" aria-expanded="false">
          <span id="grade-btn-label">Grade 4</span>
          <span class="grade-chevron">▾</span>
        </button>
        <div class="grade-menu" id="grade-menu" role="listbox"></div>
      </div>

    </div>
  </header>

  <!-- ════════════════════════════════════════
       HOME SECTION
  ════════════════════════════════════════ -->
  <div id="home-section">

    <div class="hero">
      <h1 data-i18n-html="heroTitle"></h1>
      <p class="hero-tagline" data-i18n="heroTagline"></p>
      <div class="grade-info" id="grade-info"></div>
    </div>

    <!-- Practice type picker -->
    <div class="section-label" data-i18n="practiceType"></div>
    <div class="practice-toggle" id="practice-toggle">
      <button class="practice-btn active" data-type="math" onclick="selectPracticeType(this)" data-i18n="math"></button>
      <button class="practice-btn" data-type="conversions" onclick="selectPracticeType(this)" data-i18n="conversions"></button>
      <button class="practice-btn" data-type="times-table" onclick="selectPracticeType(this)" data-i18n="timesTable"></button>
    </div>

    <!-- Picker zone: conversion category ↔ operation ↔ times table (fixed height to prevent layout shift) -->
    <div class="picker-zone">

    <!-- Times table picker -->
    <div id="times-grid-wrap" style="display:none;">
      <div class="section-label" data-i18n="chooseTable"></div>
      <div class="times-grid" id="times-grid"></div>
    </div>

    <!-- Conversion category picker -->
    <div id="conv-grid-wrap" style="display:none;">
      <div class="section-label" data-i18n="chooseCategory"></div>
      <div class="op-grid conv-grid" id="conv-grid"></div>
    </div>

    <!-- Operation picker -->
    <div id="op-grid-wrap">
    <div class="section-label" data-i18n="chooseOperation"></div>
    <div class="op-grid">
      <div class="op-card" data-op="addition" onclick="selectOp(this)">
        <span class="op-symbol">+</span>
        <div class="op-name" data-i18n="addition"></div>
      </div>
      <div class="op-card" data-op="subtraction" onclick="selectOp(this)">
        <span class="op-symbol">−</span>
        <div class="op-name" data-i18n="subtraction"></div>
      </div>
      <div class="op-card" data-op="multiplication" onclick="selectOp(this)">
        <span class="op-symbol">×</span>
        <div class="op-name" data-i18n="multiplication"></div>
      </div>
      <div class="op-card" data-op="division" onclick="selectOp(this)">
        <span class="op-symbol">÷</span>
        <div class="op-name" data-i18n="division"></div>
      </div>
    </div>
    </div><!-- /#op-grid-wrap -->

    </div><!-- /.picker-zone -->

    <!-- Question count picker -->
    <div class="section-label" data-i18n="numberOfQuestions"></div>
    <div class="count-grid">
      <div class="count-card active" data-count="10" onclick="selectCount(this)">
        <span class="count-number">10</span>
        <div class="count-label" data-i18n="quick"></div>
      </div>
      <div class="count-card" data-count="20" onclick="selectCount(this)">
        <span class="count-number">20</span>
        <div class="count-label" data-i18n="standard"></div>
      </div>
      <div class="count-card" data-count="30" onclick="selectCount(this)">
        <span class="count-number">30</span>
        <div class="count-label" data-i18n="long"></div>
      </div>
      <div class="count-card" data-count="40" onclick="selectCount(this)">
        <span class="count-number">40</span>
        <div class="count-label" data-i18n="marathon"></div>
      </div>
    </div>

    <!-- Input mode picker -->
    <div class="section-label" data-i18n="inputMode"></div>
    <div class="mode-grid">
      <div class="mode-card active" data-mode="quiz" onclick="selectMode(this)">
        <div class="mode-preview quiz-preview">
          <span class="mp-choice mp-correct">42</span>
          <span class="mp-choice">39</span>
          <span class="mp-choice">45</span>
          <span class="mp-choice">37</span>
        </div>
        <div class="mode-name" data-i18n="modeQuiz"></div>
        <div class="mode-desc" data-i18n="modeQuizDesc"></div>
      </div>
      <div class="mode-card" data-mode="input" onclick="selectMode(this)">
        <div class="mode-preview input-preview">
          <div class="mp-numrow">
            <span class="mp-key">1</span><span class="mp-key">2</span><span class="mp-key">3</span>
            <span class="mp-key">4</span><span class="mp-key">5</span><span class="mp-key">6</span>
            <span class="mp-key">7</span><span class="mp-key">8</span><span class="mp-key">9</span>
          </div>
          <div class="mp-numrow mp-bottom-row">
            <span class="mp-key">0</span>
            <span class="mp-key mp-key-del">⌫</span>
            <span class="mp-key mp-key-ok">✓</span>
          </div>
        </div>
        <div class="mode-name" data-i18n="modeInput"></div>
        <div class="mode-desc" data-i18n="modeInputDesc"></div>
      </div>
    </div>

    <div class="start-row">
      <button class="btn-submit" id="start-btn" onclick="startQuiz()" disabled data-i18n="startTraining"></button>
    </div>
    <div class="print-open-row">
      <button class="btn-print-open" onclick="openPrintConfig()" data-i18n="printWorksheet"></button>
    </div>

    <!-- Session history -->
    <div id="history-section" style="display:none;">
      <div class="history-header">
        <div class="section-label" style="margin-bottom:0;" data-i18n="sessionHistory"></div>
        <button class="btn-clear-history" onclick="clearHistory()" data-i18n="clearAll"></button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>

  </div><!-- /#home-section -->

  <!-- ════════════════════════════════════════
       QUIZ SECTION
  ════════════════════════════════════════ -->
  <div id="quiz-section">

    <div class="scorebar">
      <!-- Row 1: stats + progress + stop -->
      <div class="scorebar-row">
        <div class="score-item">
          <span class="score-label" data-i18n="correct"></span>
          <span class="score-val green" id="score-correct">0</span>
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="progress-bar"></div>
        </div>
        <div class="score-item">
          <span class="score-label" data-i18n="wrong"></span>
          <span class="score-val red" id="score-wrong">0</span>
        </div>
        <button class="btn-cancel" onclick="cancelQuiz()" data-i18n="stop"></button>
      </div>
      <!-- Row 2: Q counter + timer, fixed width so layout never shifts -->
      <div class="scorebar-row scorebar-row-meta">
        <div class="score-item">
          <span class="score-label">Q</span>
          <span class="score-val grape" id="q-counter">1/10</span>
        </div>
        <div class="scorebar-divider"></div>
        <div class="score-item">
          <span class="score-label" data-i18n="time"></span>
          <span class="score-val" id="session-timer">0:00</span>
        </div>
      </div>
    </div>

    <div class="conv-ref-box" id="conv-ref-box" style="display:none;">
      <div class="conv-ref-title" id="conv-ref-title"></div>
      <div class="conv-ref-list" id="conv-ref-list"></div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-number" id="q-label"></div>
      <div class="q-equation" id="q-equation"></div>
      <div class="choices-grid" id="choices-grid"></div>
      <div class="numpad-wrap" id="numpad-wrap" style="display:none;">
        <div class="numpad-display" id="numpad-display">_</div>
        <div class="numpad-grid" id="numpad-grid"></div>
        <button class="numpad-confirm" id="numpad-confirm" onclick="handleNumpadKey('✓')">✓</button>
      </div>
      <div class="feedback" id="feedback-msg"></div>
    </div>

  </div><!-- /#quiz-section -->

  <!-- ════════════════════════════════════════
       RESULT SECTION
  ════════════════════════════════════════ -->
  <div id="result-section">

    <!-- compact result banner -->
    <div class="res-banner">
      <div class="res-banner-top">
        <div class="res-identity">
          <span class="res-emoji" id="result-emoji">🎉</span>
          <div class="res-text">
            <div class="res-title" id="result-title"></div>
            <div class="res-sub" id="result-sub"></div>
          </div>
        </div>
      </div>
      <div class="res-score-row">
        <span class="res-score-pts" id="res-score-pts">—</span>
        <span class="res-score-max" id="res-score-max"></span>
        <div class="res-pb-label" id="res-pb-label"></div>
      </div>
      <div class="res-scoreband">
        <div class="res-stat">
          <span class="res-stat-val green" id="res-correct">—</span>
          <span class="res-stat-lbl" data-i18n="correct"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val red" id="res-wrong">—</span>
          <span class="res-stat-lbl" data-i18n="wrong"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val grape" id="res-pct">—</span>
          <span class="res-stat-lbl" data-i18n="score"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val" id="res-duration">—</span>
          <span class="res-stat-lbl" data-i18n="duration"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val" id="res-avg">—</span>
          <span class="res-stat-lbl" data-i18n="avgPerQuestion"></span>
        </div>
      </div>
      <div class="res-badge-row">
        <span class="badge-grade" id="res-grade-badge"></span>
        <span class="badge-mode"  id="res-mode-badge"></span>
      </div>
      <div class="res-banner-footer">
        <button class="btn-secondary" onclick="goHome()" data-i18n="backToOverview"></button>
      </div>
    </div>

    <div class="summary-header">
      <div class="section-label" style="margin-bottom:0;" data-i18n="questionSummary"></div>
      <span class="summary-count" id="summary-count"></span>
    </div>
    <div class="summary-list" id="summary-list"></div>

  </div><!-- /#result-section -->

  <!-- ════════════════════════════════════════
       SESSION DETAIL
  ════════════════════════════════════════ -->
  <div id="detail-section">
    <div class="res-banner">
      <div class="res-banner-top">
        <div class="res-identity">
          <span class="res-emoji" id="detail-emoji">🎉</span>
          <div class="res-text">
            <div class="res-title" id="detail-title">—</div>
            <div class="res-sub" id="detail-sub">—</div>
          </div>
        </div>
      </div>
      <div class="res-score-row">
        <span class="res-score-pts" id="detail-score-pts">—</span>
        <span class="res-score-max" id="detail-score-max"></span>
        <div class="res-pb-label" id="detail-pb-label"></div>
      </div>
      <div class="res-scoreband">
        <div class="res-stat">
          <span class="res-stat-val green" id="detail-correct">—</span>
          <span class="res-stat-lbl" data-i18n="correct"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val red" id="detail-wrong">—</span>
          <span class="res-stat-lbl" data-i18n="wrong"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val grape" id="detail-pct">—</span>
          <span class="res-stat-lbl" data-i18n="score"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val" id="detail-duration">—</span>
          <span class="res-stat-lbl" data-i18n="duration"></span>
        </div>
        <div class="res-divider"></div>
        <div class="res-stat">
          <span class="res-stat-val" id="detail-avg">—</span>
          <span class="res-stat-lbl" data-i18n="avgPerQuestion"></span>
        </div>
      </div>
      <div class="res-badge-row">
        <span class="badge-grade" id="detail-grade-badge"></span>
        <span class="badge-mode"  id="detail-mode-badge"></span>
      </div>
      <div class="res-banner-footer">
        <button class="btn-secondary" onclick="closeDetail()" data-i18n="backToOverview"></button>
      </div>
    </div>
    <div class="summary-header">
      <div class="section-label" style="margin-bottom:0;" data-i18n="questionSummary"></div>
      <span class="summary-count" id="detail-count"></span>
    </div>
    <div class="summary-list" id="detail-list"></div>
  </div><!-- /#detail-section -->

  <!-- ════════════════════════════════════════
       PRINT CONFIG SECTION
  ════════════════════════════════════════ -->
  <div id="print-config-section" style="display:none;"></div>

</div><!-- /.wrap -->

<!-- Print-only worksheet — hidden on screen, shown in @media print -->
<div id="print-section" aria-hidden="true"></div>

<script src="app.js"></script>
</body>
</html>
